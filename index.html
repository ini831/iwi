<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>企业内部管理系统</title>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-slate-200">
        <div class="mb-8 text-center">
            <div class="w-12 h-12 bg-blue-600 rounded-xl mx-auto mb-4 flex items-center justify-center text-white font-bold text-2xl">IT</div>
            <h2 class="text-2xl font-bold text-slate-800">系统登录</h2>
            <p class="text-slate-500 text-sm mt-1">请输入您的凭据以访问内部资源</p>
        </div>

        <form class="space-y-4">
            <input type="text" placeholder="员工编号" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
            <input type="password" placeholder="通行密钥" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
            
            <button type="button" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition active:scale-[0.98]">
                安全登录
            </button>
        </form>

        <div class="mt-6 text-center text-xs text-slate-400">
            © 2026 企业IT支持部 - 仅限内部授权访问
        </div>
    </div>
</body>
</html>
