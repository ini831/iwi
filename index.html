<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 强制使用现代无衬线字体，并放大基准字号 */
        body { 
            background-color: #050505; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 18px; 
            line-height: 1.75;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 bg-[#0d0d0d] p-5 border-r border-[#202020]">
        <div class="text-[15px] font-medium cursor-pointer hover:bg-[#1a1a1a] p-3 rounded-xl transition">
            + 新聊天
        </div>
    </aside>

    <main class="flex-1 flex flex-col items-center justify-center p-6">
        <h1 class="text-5xl font-semibold mb-16 tracking-tighter">我们先从哪里开始呢？</h1>
        
        <div class="w-full max-w-3xl">
            <div class="bg-[#1e1e1e] rounded-3xl p-6 shadow-2xl border border-[#333]">
                <input type="text" placeholder="输入问题..." 
                       class="w-full bg-transparent outline-none text-xl placeholder-[#555] text-white">
            </div>
            <div class="text-center mt-6 text-sm text-[#444]">
                NexAI 旨在提供更舒适的交互体验。
            </div>
        </div>
    </main>

</body>
</html>
